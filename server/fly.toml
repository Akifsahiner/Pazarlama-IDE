# Fly.io deploy config for Marketing IDE server.
# Usage: fly launch / fly deploy (from server/ directory)
# Requires: fly secrets set ANTHROPIC_API_KEY=... SUPABASE_URL=... etc.

app = "marketing-ide-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    timeout = "10s"

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 2
