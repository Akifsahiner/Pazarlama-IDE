name: desktop-ci

on:
  push:
    branches: [main, master]
    paths:
      - "desktop/**"
      - "server/**"
      - "README.md"
      - "AGENTS.md"
      - ".github/workflows/desktop-ci.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "server/**"
      - "README.md"
      - "AGENTS.md"
      - ".github/workflows/desktop-ci.yml"

jobs:
  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run test:shared
      - run: node scripts/trust-copy-regression.mjs
      - run: node scripts/golden-path-smoke.mjs

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: node evals/skill-coverage.mjs

  gtm-eval:
    runs-on: ubuntu-latest
    needs: server
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: GTM golden evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not configured — skipping eval:gtm"
            exit 0
          fi
          npm run eval:gtm

  desktop-e2e:
    runs-on: windows-latest
    needs: desktop
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:e2e
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - run: npm run test:e2e:wow
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          MARKETING_IDE_E2E_FIXTURE: e2e/fixtures/sample-app
