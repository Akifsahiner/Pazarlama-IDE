name: desktop-ci

on:
  push:
    branches: [main, master]
    paths:
      - "desktop/**"
      - "server/**"
      - "skills/**"
      - "README.md"
      - "AGENTS.md"
      - ".github/workflows/desktop-ci.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "server/**"
      - "skills/**"
      - "README.md"
      - "AGENTS.md"
      - ".github/workflows/desktop-ci.yml"
  schedule:
    - cron: "0 3 * * *"

jobs:
  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run test:shared
      - run: npm run test:execution-kernel-bypass
      - run: node scripts/trust-copy-regression.mjs
      - run: node scripts/golden-path-smoke.mjs
      - run: node scripts/verify-fixture-smoke.mjs

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: node evals/skill-coverage.mjs
      - run: npm run skill:audit
      - run: npm run eval:skill-quality
      - run: npm run eval:p0-plan-smoke
      - run: npm run eval:devflow-plan-smoke
      - run: npm run eval:thesis-quality
      - run: npm run eval:task-contract
      - run: npm run eval:execution-kernel

  gtm-eval:
    runs-on: ubuntu-latest
    needs: server
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: GTM golden evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not configured — skipping eval:gtm"
            exit 0
          fi
          npm run eval:gtm

  desktop-e2e:
    runs-on: windows-latest
    needs: desktop
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:e2e
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - run: npm run test:e2e:wow
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          MARKETING_IDE_E2E_FIXTURE: e2e/fixtures/sample-app
      - run: npm run test:e2e:cmo-multi
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          MARKETING_IDE_E2E_FIXTURE: e2e/fixtures/sample-app

  desktop-cmo-prod-nightly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Week 1 prod agent E2E (@cmo-prod)
        run: npm run test:e2e:cmo-prod
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          MARKETING_IDE_E2E_FIXTURE: e2e/fixtures/sample-app
          MARKETING_IDE_AGENT_SMOKE: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        timeout-minutes: 45
