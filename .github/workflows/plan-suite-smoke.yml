# Plan suite smoke — requires ANTHROPIC_API_KEY in server/.env (CI secret)
name: plan-suite-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "server/src/brain/**"
      - "server/src/schemas/**"
      - "server/plan-suite-smoke.mjs"
      - "server/evals/**"
      - "skills/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Skill pack coverage
        run: node evals/skill-coverage.mjs
      - name: Plan suite smoke
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node plan-suite-smoke.mjs
        if: env.ANTHROPIC_API_KEY != ''
